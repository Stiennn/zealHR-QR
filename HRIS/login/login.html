<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Community Medical Services Foundation</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex">
        <!-- Left Side - Branding (50%) -->
        <div class="hidden lg:flex w-1/2 relative items-center justify-center p-8 overflow-hidden" style="background: linear-gradient(to bottom, #022343, #004A8D);">
            <!-- Background Image -->
            <div 
                class="absolute inset-0 bg-cover bg-center opacity-5"
                style="background-image: url('../admin/images/logo.jpg');"
            ></div>
            
            <!-- Content -->
            <div class="relative text-center text-white z-10">
                <!-- Logo Circle -->
                <div class="flex justify-center mb-8">
                    <div style="filter: drop-shadow(0px 4px 4px rgba(0, 0, 0, 0.25));">
                        <img 
                            src="../images/blue-white-logo.png" 
                            alt="Community Medical Services Foundation Logo"
                            class="w-50 h-50 object-contain"
                        >
                    </div>
                </div>
                
                <!-- Heading -->
                <h1 class="text-4xl font-bold mb-4" style="filter: drop-shadow(0px 4px 4px rgba(0, 0, 0, 0.25));">Manage your workforce<br>with precision.</h1>
                
                <!-- Description -->
                <p class="text-blue-100 text-sm leading-relaxed max-w-sm" style="filter: drop-shadow(0px 4px 4px rgba(0, 0, 0, 0.25));">
                    An advanced administrative ecosystem for staff. Foundation professionals to streamline healthcare resource and community operations.
                </p>
            </div>
        </div>

        <div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-8">
            <div class="w-full max-w-md">
                <!-- Header -->
                <div class="mb-8">
                    <h2 class="text-3xl font-bold text-gray-900 mb-2">Login</h2>
                    <p class="text-gray-600 text-sm">Please enter your authenticated credentials to login</p>
                </div>

                <!-- Form -->
                <form class="space-y-6">
                    <!-- Email Field -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">EMAIL ADDRESS</label>
                        <input 
                            type="email" 
                            placeholder="user@yourcompany.org"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition"
                            required
                        >
                    </div>

                    <!-- Password Field -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">PASSWORD</label>
                        <input 
                            type="password" 
                            placeholder="••••••••"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition"
                            required
                        >
                    </div>

                    <!-- Forgot Password Link -->
                    <div class="text-right">
                        <a href="#" class="text-sm text-blue-600 hover:text-blue-700 font-medium">
                            Forgot password?
                        </a>
                    </div>

                    <!-- Login Button -->
                    <button 
                        type="submit"
                        class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 rounded-lg transition duration-200 flex items-center justify-center space-x-2"
                    >
                        <span>Login</span>
                        <span>→</span>
                    </button>
                </form>

                <!-- Footer -->
                <div class="mt-8 text-center">
                    <p class="text-xs text-gray-500">
                        © 2024 COMMUNITY MEDICAL SERVICES FOUNDATION
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
